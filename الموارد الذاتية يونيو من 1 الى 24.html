<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحليل الفواتير والتحصيل</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;background:#f0f4fa;display:flex;align-items:center;justify-content:center;min-height:100vh}
.lock-box{background:#fff;border-radius:16px;padding:40px 36px;width:340px;box-shadow:0 8px 32px rgba(37,99,235,.10);text-align:center}
.lock-icon{font-size:40px;margin-bottom:16px}
.lock-title{font-size:20px;font-weight:800;color:#1a2235;margin-bottom:6px}
.lock-sub{font-size:13px;color:#6b7a99;margin-bottom:24px}
input[type=password]{width:100%;padding:12px 16px;border:1.5px solid #dde2ec;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:15px;text-align:center;letter-spacing:4px;outline:none;transition:border-color .2s;direction:ltr}
input[type=password]:focus{border-color:#2563eb}
.btn{width:100%;margin-top:14px;padding:12px;background:#2563eb;color:#fff;border:none;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s}
.btn:hover{background:#1d4ed8}
.err{color:#c0392b;font-size:13px;margin-top:10px;display:none}
.hospital{font-size:11px;color:#a0aec0;margin-top:20px}
</style>
</head>
<body>
<div class="lock-box">
  <div class="lock-icon">&#128274;</div>
  <div class="lock-title">تحليل الفواتير والتحصيل</div>
  <div class="lock-sub">مستشفى الولادة والأطفال<br>الفترة: 1–24 يونيو 2026</div>
  <input type="password" id="pwd" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')check()">
  <button class="btn" onclick="check()">دخول</button>
  <div class="err" id="err">كلمة المرور غير صحيحة</div>
  <div class="hospital">قسم الإحصاء الطبي — تجمع حفر الباطن الصحي</div>
</div>
