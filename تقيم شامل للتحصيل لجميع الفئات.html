<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خطة تحسين إيرادات الموارد الذاتية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',sans-serif;background:#0F1629;display:flex;align-items:center;justify-content:center;min-height:100vh}
.lock-box{background:#161f3a;border:1px solid rgba(255,255,255,0.10);border-radius:20px;padding:44px 40px;width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.lock-icon{font-size:44px;margin-bottom:18px}
.lock-title{font-size:20px;font-weight:800;color:#fff;margin-bottom:6px}
.lock-sub{font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:28px;line-height:1.6}
input[type=password]{width:100%;padding:13px 16px;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.15);border-radius:12px;font-family:'Tajawal',sans-serif;font-size:18px;text-align:center;letter-spacing:6px;outline:none;color:#fff;transition:border-color .2s}
input[type=password]:focus{border-color:#2563EB}
.btn{width:100%;margin-top:14px;padding:13px;background:#2563EB;color:#fff;border:none;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s}
.btn:hover{background:#1d4ed8}
.err{color:#F87171;font-size:13px;margin-top:12px;display:none}
.hospital{font-size:11px;color:rgba(255,255,255,0.3);margin-top:22px}
</style>
</head>
<body>
<div class="lock-box">
  <div class="lock-icon">🔒</div>
  <div class="lock-title">خطة تحسين الموارد الذاتية</div>
  <div class="lock-sub">مستشفى الولادة والأطفال<br>تجمع حفر الباطن الصحي</div>
  <input type="password" id="pwd" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')check()">
  <button class="btn" onclick="check()">دخول</button>
  <div class="err" id="err">كلمة المرور غير صحيحة</div>
  <div class="hospital">قسم الإحصاء الطبي</div>
</div>

  if(document.getElementById('pwd').value==='1234'){
    var b=atob(_d);
    var u=new Uint8Array(b.length);
    for(var i=0;i<b.length;i++) u[i]=b.charCodeAt(i);

  }
}
